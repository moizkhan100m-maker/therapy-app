<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <title>My Firebase App</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" id="manifest-link">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#D6EDD6;--bg2:#C8DEFA;--bg3:#F0E6D3;--bg4:#D6EAE6;
      --surf:rgba(255,255,255,0.70);--surf2:rgba(255,255,255,0.44);--s-solid:#FFFFFF;
      --text:#1C1917;--text2:#6B6258;--text3:#A09078;
      --accent:#B86830;--accent-bg:rgba(184,104,48,0.13);
      --teal:#1B9470;--teal-bg:rgba(27,148,112,0.12);
      --blue:#2563A8;--blue-bg:rgba(37,99,168,0.10);
      --amber:#A87E20;--amber-bg:rgba(168,126,32,0.12);
      --pink:#A84060;--pink-bg:rgba(168,64,96,0.12);
      --red:#C42B2B;--red-bg:rgba(196,43,43,0.10);
      --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.055);
      --shadow:0 4px 28px rgba(0,0,0,0.08);
      --r:18px;--rsm:12px;--nav:72px;
    }
    @media(prefers-color-scheme:dark){html[data-theme="auto"]{
      --bg1:#0B1D11;--bg2:#0B1327;--bg3:#1F130F;--bg4:#0B1D1B;
      --surf:rgba(16,24,18,0.84);--surf2:rgba(16,24,18,0.56);--s-solid:#131A15;
      --text:#EFE9D7;--text2:#988E7E;--text3:#665D50;
      --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.05);
      --shadow:0 4px 28px rgba(0,0,0,0.38);
    }}
    html[data-theme="dark"]{
      --bg1:#0B1D11;--bg2:#0B1327;--bg3:#1F130F;--bg4:#0B1D1B;
      --surf:rgba(16,24,18,0.84);--surf2:rgba(16,24,18,0.56);--s-solid:#131A15;
      --text:#EFE9D7;--text2:#988E7E;--text3:#665D50;
      --border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.05);
      --shadow:0 4px 28px rgba(0,0,0,0.38);
    }
    html[data-theme="light"]{
      --bg1:#D6EDD6;--bg2:#C8DEFA;--bg3:#F0E6D3;--bg4:#D6EAE6;
      --surf:rgba(255,255,255,0.70);--surf2:rgba(255,255,255,0.44);--s-solid:#FFFFFF;
      --text:#1C1917;--text2:#6B6258;--text3:#A09078;
      --border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.055);
      --shadow:0 4px 28px rgba(0,0,0,0.08);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;font-family:'DM Sans',-apple-system,sans-serif;color:var(--text);font-size:15px;line-height:1.6;}
    body{position:relative;overflow:hidden;}
    .bgc{position:fixed;inset:0;z-index:0;background:linear-gradient(-45deg,var(--bg1),var(--bg2),var(--bg3),var(--bg4));background-size:400% 400%;animation:bgS 24s ease infinite;}
    @keyframes bgS{0%{background-position:0% 5No response
